name: 📦 Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: Tag to build
        required: false
        type: string
    outputs:
      version:
        description: The true version of the package
        value: ${{ jobs.lambda.outputs.version }}
      artifact:
        description: The Lambda ZIP artifact name
        value: ${{ jobs.lambda.outputs.artifact }}
      package:
        description: The PyPI package artifact name
        value: ${{ jobs.plugin.outputs.package }}

jobs:

  lambda:
    name: Lambda ZIP
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      artifact: ${{ steps.check_version.outputs.artifact }}
    steps:

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: lambda/pyproject.toml

    - name: Install Build Dependencies
      working-directory: lambda
      run: pip install .[build]

    - name: Check True Version
      id: check_version
      working-directory: lambda
      run: |
        version=$(python -m setuptools_scm)
        artifact="duploctl-cfn-${version}.zip"
        echo "Building Version: $version"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "artifact=$artifact" >> $GITHUB_OUTPUT

    - name: Build Lambda ZIP
      working-directory: lambda
      run: |
        mkdir -p package
        pip install . --target ./package
        cd package && zip -r ../duploctl-cfn.zip .

    - name: Show Files
      working-directory: lambda
      run: ls -lh duploctl-cfn.zip

    - name: Upload ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.check_version.outputs.artifact }}
        path: lambda/duploctl-cfn.zip
        retention-days: 30

  plugin:
    name: PyPI Plugin
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      package: ${{ steps.check_version.outputs.package }}
    steps:

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install Dependencies
      run: pip install .[build]

    - name: Check True Version
      id: check_version
      run: |
        version=$(python -m setuptools_scm)
        package="duploctl_cfn-${version}"
        echo "Building Version: $version"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "package=$package" >> $GITHUB_OUTPUT

    - name: Run the Build
      run: python -m build

    - name: Show Files
      run: ls -l dist

    - name: Upload Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.check_version.outputs.package }}
        path: dist/
        retention-days: 30
